<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flashcard Quiz App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Header -->

    <header class="header">

        <div class="logo">

            <i class="fa-solid fa-layer-group"></i>

            <div>

                <h1>Flashcard Quiz App</h1>

                <p>Study smarter with interactive flashcards</p>

            </div>

        </div>

    </header>

    <!-- Main Container -->

    <div class="container">

        <!-- Flashcard Section -->

        <div class="flashcard">

            <span class="badge">
                <i class="fa-solid fa-book-open"></i>
                Study Card
            </span>

            <h2 id="question"></h2>

            <button id="showAnswerBtn">

                <i class="fa-solid fa-eye"></i>

                Show Answer

            </button>

            <p id="answer" class="hidden"></p>

        </div>

        <!-- Progress -->

        <div class="progress-area">

            <div class="progress-info">

                <span id="cardCount"></span>

            </div>

            <div class="progress-bar">

                <div id="progress"></div>

            </div>

        </div>

        <!-- Navigation -->

        <div class="navigation">

            <button id="prevBtn">

                <i class="fa-solid fa-arrow-left"></i>

                Previous

            </button>

            <button id="nextBtn">

                Next

                <i class="fa-solid fa-arrow-right"></i>

            </button>

        </div>
                <!-- Manage Flashcards -->

        <div class="manager">

            <h2>Manage Flashcards</h2>

            <label>Question</label>

            <textarea
                id="questionInput"
                rows="3"
                placeholder="Enter your question..."></textarea>

            <label>Answer</label>

            <textarea
                id="answerInput"
                rows="3"
                placeholder="Enter the answer..."></textarea>

            <div class="action-buttons">

                <button id="addBtn" class="add-btn">
                    <i class="fa-solid fa-plus"></i>
                    Add Card
                </button>

                <button id="updateBtn" class="update-btn">
                    <i class="fa-solid fa-pen"></i>
                    Update Card
                </button>

                <button id="deleteBtn" class="delete-btn">
                    <i class="fa-solid fa-trash"></i>
                    Delete Card
                </button>

            </div>

        </div>

        <!-- Flashcard List -->

        <div class="card-list">

            <h2>All Flashcards</h2>

            <ul id="flashcardList">

            </ul>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        <p>© 2026 Flashcard Quiz App | Built using HTML, CSS & JavaScript</p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
