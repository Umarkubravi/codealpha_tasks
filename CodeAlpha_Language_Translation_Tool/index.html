<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Language Translation Tool</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

    <h1>
        <i class="fa-solid fa-language"></i>
        Language Translation Tool
    </h1>

    <p>Translate text instantly between multiple languages.</p>

</header>

<div class="container">

    <div class="translator-box">

        <textarea
            id="inputText"
            placeholder="Enter text to translate..."></textarea>

        <div class="selectors">

            <select id="sourceLanguage">

                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="ur">Urdu</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>

            </select>

            <i class="fa-solid fa-arrow-right-arrow-left"></i>

            <select id="targetLanguage">

                <option value="hi">Hindi</option>
                <option value="en">English</option>
                <option value="ur">Urdu</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>

            </select>

        </div>

        <button id="translateBtn">
            <i class="fa-solid fa-language"></i>
            Translate
        </button>

        <textarea
            id="outputText"
            placeholder="Translated text will appear here..."
            readonly></textarea>

        <button id="copyBtn">
            <i class="fa-solid fa-copy"></i>
            Copy Translation
        </button>

    </div>

</div>
<footer>

    <p>© 2026 Language Translation Tool | Built with HTML, CSS & JavaScript</p>

</footer>

<script src="script.js"></script>

</body>

</html>
